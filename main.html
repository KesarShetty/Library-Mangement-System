/* Container */

.container {

    width: 750px;

    margin: 50px auto;

    padding: 30px;

    border-radius: 20px;

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 0 40px rgba(0,255,255,0.3);
}

/* Heading */

h1 {
    text-align: center;
}

/* Dashboard */

.dashboard {

    display: flex;

    justify-content: space-between;

    gap: 15px;

    margin-top: 30px;
}

.card {

    flex: 1;

    padding: 20px;

    text-align: center;

    border-radius: 15px;

    background: rgba(255,255,255,0.1);

    border: 1px solid rgba(255,255,255,0.2);
}

.card h2 {

    font-size: 35px;

    margin: 0;
}

/* Inputs */

input {

    width: 100%;

    padding: 12px;

    margin-top: 10px;

    border-radius: 10px;

    border: none;

    outline: none;

    background: rgba(255,255,255,0.15);

    color: white;

    font-size: 16px;

    box-sizing: border-box;
}

input::placeholder {

    color: rgba(255,255,255,0.7);
}

/* Buttons */

button {

    width: 200px;

    padding: 12px;

    margin-top: 20px;

    border: none;

    border-radius: 10px;

    font-size: 16px;

    cursor: pointer;

    color: white;

    background: linear-gradient(45deg,#00f5ff,#ff00ff);

    transition: 0.3s;
}

button:hover {

    transform: scale(1.05);

    box-shadow: 0 0 20px #00f5ff;
}

/* Sections */

section {
    margin-top: 30px;
}

/* Book Cards */

.book-card {

    margin-top: 15px;

    padding: 15px;

    border-radius: 15px;

    background: rgba(255,255,255,0.1);

    border: 1px solid rgba(255,255,255,0.2);
}

.book-card h3 {
    margin: 0;
}

.book-card p {
    margin: 8px 0;
}

/* Action Buttons */

.action-buttons {

    display: flex;

    gap: 10px;

    margin-top: 10px;
}

.action-buttons button {

    width: auto;

    padding: 10px 15px;
}

/* Dark Mode */

.dark {
    background: black;
}

.dark .container {
    background: rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<div class="container">

    <header>

        <h1>📚 Smart Library Management System</h1>

        
    </header>

    <!-- Dashboard -->

    <div class="dashboard">

        <div class="card">
            <h2 id="totalBooks">0</h2>
            <p>Total Books</p>
        </div>

        <div class="card">
            <h2 id="issuedBooks">0</h2>
            <p>Issued Books</p>
        </div>

        <div class="card">
            <h2 id="availableBooks">0</h2>
            <p>Available Books</p>
        </div>

    </div>

    <!-- Add Book -->

    <section>

        <h2>Add New Book</h2>

        <input
        type="text"
        id="title"
        placeholder="Enter Book Title"
        >

        <input
        type="text"
        id="author"
        placeholder="Enter Author Name"
        >

        <input
        type="text"
        id="category"
        placeholder="Enter Category"
        >

        <center>

            <button onclick="addBook()">
                Add Book
            </button>

        </center>

    </section>

    <!-- Search -->

    <section>

        <h2>Search Books</h2>

        <input
        type="text"
        id="searchInput"
        placeholder="Search by title or author"
        onkeyup="searchBooks()"
        >

    </section>

    <!-- Book List -->

    <section>

        <h2>Book List</h2>

        <div id="bookList"></div>

    </section>

</div>

<script>

/* Dashboard */

function updateDashboard() {

    document.getElementById("totalBooks").innerText =
    books.length;

    const issuedBooks =
    books.filter(book => book.issued).length;

    document.getElementById("issuedBooks").innerText =
    issuedBooks;

    document.getElementById("availableBooks").innerText =
    books.length - issuedBooks;
}

/* Add Book */

function addBook() {

    const title =
    document.getElementById("title").value;

    const author =
    document.getElementById("author").value;

    const category =
    document.getElementById("category").value;

    if(
        title === "" ||
        author === "" ||
        category === ""
    ) {

        alert("Please fill all fields");

        return;
    }

    const book = {

        id: Date.now(),

        title: title,

        author: author,

        category: category,

        issued: false,

        student_id: "",

        student_name: "",

        class_name: ""
    };

    books.push(book);

    updateDashboard();

    displayBooks();

    document.getElementById("title").value = "";

    document.getElementById("author").value = "";

    document.getElementById("category").value = "";
}

/* Display Books */

function displayBooks(filteredBooks = books) {

    const bookList =
    document.getElementById("bookList");

    bookList.innerHTML = "";

    if(filteredBooks.length === 0) {

        bookList.innerHTML =
        "<p>No books available</p>";

        return;
    }

    filteredBooks.forEach(book => {

        const div =
        document.createElement("div");

        div.classList.add("book-card");

        div.innerHTML = `

        <h3>${book.title}</h3>

        <p>
        <b>Author:</b>
        ${book.author}
        </p>

        <p>
        <b>Category:</b>
        ${book.category}
        </p>

        <p>
        <b>Status:</b>
        ${book.issued ? "Issued" : "Available"}
        </p>

        <p>
        <b>Student ID:</b>
        ${book.student_id || "Not Issued"}
        </p>

        <p>
        <b>Student Name:</b>
        ${book.student_name || "Not Issued"}
        </p>

        <p>
        <b>Class:</b>
        ${book.class_name || "Not Issued"}
        </p>

        <div class="action-buttons">

            <button onclick="issueBook(${book.id})">

            ${book.issued
            ? "Return Book"
            : "Issue Book"}

            </button>

            <button onclick="deleteBook(${book.id})">

            Delete

            </button>

        </div>
        `;

        bookList.appendChild(div);
    });
}

/* Issue or Return Book */

function issueBook(id) {

    books = books.map(book => {

        if(book.id === id) {

            if(book.issued) {

                book.issued = false;

                book.student_id = "";

                book.student_name = "";

                book.class_name = "";

            } else {

                const studentId =
                prompt("Enter Student ID");

                const studentName =
                prompt("Enter Student Name");

                const className =
                prompt("Enter Class Name");

                if(
                    studentId &&
                    studentName &&
                    className
                ) {

                    book.issued = true;

                    book.student_id = studentId;

                    book.student_name = studentName;

                    book.class_name = className;
                }
            }
        }

        return book;
    });

    updateDashboard();

    displayBooks();
}

/* Delete Book */

function deleteBook(id) {

    books =
    books.filter(book => book.id !== id);

    updateDashboard();

    displayBooks();
}

/* Search Books */

function searchBooks() {

    const searchValue =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    const filteredBooks =
    books.filter(book =>

        book.title
        .toLowerCase()
        .includes(searchValue)

        ||

        book.author
        .toLowerCase()
        .includes(searchValue)
    );

    displayBooks(filteredBooks);
}

/* Dark Mode */

function toggleDarkMode() {

    document.body
    .classList.toggle("dark");
}

/* Initial Load */

updateDashboard();

displayBooks();

</script>
